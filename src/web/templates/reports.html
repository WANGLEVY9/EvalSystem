{% extends "base.html" %}
{% block title %}评测报告 · EvalSystem{% endblock %}
{% block content %}
<div x-data="reportsPage()" class="max-w-7xl mx-auto space-y-6">
  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">📂 评测报告</h1>
      <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">浏览所有历史评测报告，支持筛选和排序。</p>
    </div>
    <div class="flex gap-2">
      <button @click="fetchReports()" class="px-4 py-2 rounded-lg text-sm font-medium bg-white dark:bg-gray-900 text-gray-700 dark:text-gray-300 border border-gray-300 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        刷新
      </button>
    </div>
  </div>

  <!-- Filters -->
  <div class="bg-white dark:bg-gray-900 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-800">
    <div class="flex flex-wrap items-center gap-3">
      <span class="text-sm font-medium text-gray-700 dark:text-gray-300">筛选：</span>
      <button @click="filterKind = ''" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-colors"
        :class="filterKind === '' ? 'bg-primary-500 text-white' : 'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700'">全部</button>
      <button @click="filterKind = 'report'" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-colors"
        :class="filterKind === 'report' ? 'bg-primary-500 text-white' : 'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700'">评测</button>
      <button @click="filterKind = 'comparison'" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-colors"
        :class="filterKind === 'comparison' ? 'bg-primary-500 text-white' : 'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700'">对比</button>
      <button @click="filterKind = 'calibration'" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-colors"
        :class="filterKind === 'calibration' ? 'bg-primary-500 text-white' : 'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700'">校准</button>
      <span class="text-xs text-gray-400 dark:text-gray-500 ml-auto">共 <span class="font-medium" x-text="filteredReports.length"></span> 份</span>
    </div>
  </div>

  <!-- Report List -->
  <div class="space-y-3">
    <div x-show="loading" class="bg-white dark:bg-gray-900 rounded-xl p-12 shadow-sm border border-gray-200 dark:border-gray-800 text-center">
      <div class="spinner mx-auto mb-3"></div>
      <div class="text-sm text-gray-400 dark:text-gray-500">加载中...</div>
    </div>

    <template x-for="r in filteredReports" :key="r.ts">
      <div class="bg-white dark:bg-gray-900 rounded-xl p-5 shadow-sm border border-gray-200 dark:border-gray-800 card-hover">
        <div class="flex items-start gap-4">
          <!-- Score Circle -->
          <div x-show="r.summary?.overall_score != null" class="flex-shrink-0 w-16 h-16 rounded-full flex items-center justify-center text-lg font-bold"
            :style="'background: conic-gradient(' + scoreBg(r.summary.overall_score) + ' ' + r.summary.overall_score + '% , #e5e7eb ' + r.summary.overall_score + '%' + ')'"
            style="background: conic-gradient(#3b82f6 0%, #e5e7eb 0%)">
            <div class="w-12 h-12 rounded-full bg-white dark:bg-gray-900 flex items-center justify-center">
              <span :class="scoreColor(r.summary.overall_score)" x-text="r.summary.overall_score.toFixed(0)"></span>
            </div>
          </div>

          <!-- Info -->
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <span x-html="reportKindBadge(r.kind)"></span>
              <span class="text-sm font-semibold text-gray-900 dark:text-white" x-text="r.datetime"></span>
            </div>
            <div x-show="r.summary?.task_name" class="mt-1 text-sm text-gray-600 dark:text-gray-400" x-text="r.summary.task_name"></div>
            <div class="mt-1 flex flex-wrap gap-x-4 gap-y-1 text-xs text-gray-500 dark:text-gray-400">
              <span x-show="r.summary?.total_sessions">会话数: <span class="font-medium" x-text="r.summary.total_sessions"></span></span>
              <span x-show="r.summary?.overall_score_std">标准差: <span class="font-medium" x-text="'±' + r.summary.overall_score_std.toFixed(1)"></span></span>
              <span x-show="r.summary?.overall_confidence">置信度: <span class="font-medium" :class="confidenceColor(r.summary.overall_confidence)" x-text="r.summary.overall_confidence.toFixed(2)"></span></span>
              <span x-show="r.summary?.branch_coverage != null">分支覆盖: <span class="font-medium text-green-600 dark:text-green-400" x-text="(r.summary.branch_coverage * 100).toFixed(0) + '%'"></span></span>
            </div>
          </div>

          <!-- Actions -->
          <div class="flex-shrink-0 flex gap-1.5">
            <template x-for="(fname, ext) in r.files" :key="ext">
              <a :href="'/files/' + fname" target="_blank"
                 class="px-3 py-1.5 rounded-lg text-xs font-medium transition-colors"
                 :class="ext === 'html'
                   ? 'bg-primary-500 text-white hover:bg-primary-600'
                   : 'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700'"
                 x-text="ext.toUpperCase()"></a>
            </template>
          </div>
        </div>
      </div>
    </template>

    <!-- Empty State -->
    <div x-show="!loading && filteredReports.length === 0" class="bg-white dark:bg-gray-900 rounded-xl p-12 shadow-sm border border-gray-200 dark:border-gray-800 text-center">
      <div class="text-4xl mb-3 opacity-30">📭</div>
      <div class="text-sm text-gray-400 dark:text-gray-500">
        <span x-show="filterKind">没有匹配的报告</span>
        <span x-show="!filterKind">
          尚无评测报告 —
          <a href="/eval" class="text-primary-600 dark:text-primary-400 hover:underline">发起第一个评测</a>
        </span>
      </div>
    </div>
  </div>
</div>

<script>
function reportsPage() {
  return {
    reports: [],
    loading: true,
    filterKind: '',

    get filteredReports() {
      if (!this.filterKind) return this.reports;
      return this.reports.filter(r => r.kind === this.filterKind);
    },

    init() { this.fetchReports(); },

    async fetchReports() {
      this.loading = true;
      try {
        this.reports = await apiGet('/api/reports');
      } catch (e) {
        showToast('加载报告失败: ' + e.message, 'error');
      } finally {
        this.loading = false;
      }
    },
  };
}
</script>
{% endblock %}
